spring:
  application:
    name: atlas-query-engine-demo
  datasource:
    url: ${ATLAS_DB_URL:jdbc:postgresql://localhost:5433/atlas_query_engine}
    username: ${ATLAS_DB_USERNAME:atlas}
    password: ${ATLAS_DB_PASSWORD:atlas}
    driver-class-name: ${ATLAS_DB_DRIVER:org.postgresql.Driver}
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: public
    validate-on-migrate: true
  jackson:
    deserialization:
      fail-on-unknown-properties: false

server:
  port: ${ATLAS_SERVER_PORT:8030}

atlas:
  security:
    encryption-key: ${ATLAS_ENCRYPTION_KEY:4tl4s-d3m0-sup3r-s4f3-3ncrypti0n-k3y}
  sql:
    default-dialect: ${ATLAS_DEFAULT_SQL_DIALECT:POSTGRES}
  dev:
    internal-connections:
      enabled: ${ATLAS_INTERNAL_CONNECTIONS_ENABLED:true}
